<article class="card">
  <img class="card__image" [src]="image()" [alt]="title()" />
  <div class="card__gradient"></div>

  <div class="card__content">
    <h3 class="card__title">{{ title() }}</h3>
    @if (description()) {
      <p class="card__description">{{ description() }}</p>
    }
  </div>
</article>
