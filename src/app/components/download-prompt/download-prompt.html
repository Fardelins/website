<aside class="install-prompt" [class.install-prompt--visible]="visible()" [attr.aria-hidden]="!visible()">
  <div class="install-prompt__bar">
    <div class="install-prompt__identity">
      <span class="app-icon" aria-hidden="true">
        <img src="/home/app-icon.svg" alt="" width="1027" height="1027" />
      </span>
      <span class="install-prompt__copy">
        <strong>Fardelins</strong>
        <span>{{ platformLabel }} <span class="install-prompt__rating" aria-label="Rated five stars">★★★★★</span></span>
      </span>
    </div>

    <a
      class="install-prompt__cta"
      [href]="href"
      [attr.target]="external ? '_blank' : null"
      [attr.rel]="external ? 'noopener noreferrer' : null"
      (click)="download()"
    >Download app</a>
  </div>
</aside>
