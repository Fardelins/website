<div class="blog-empty" role="status">
  <svg
    class="blog-empty__icon"
    width="40"
    height="40"
    viewBox="0 0 24 24"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
  >
    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
    <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  </svg>
  <h3 class="blog-empty__title">No articles found</h3>
  <p class="blog-empty__text">
    @if (query()) {
      No articles match "{{ query() }}". Try a different search term.
    } @else if (category() === 'All Articles') {
      We couldn't find any articles right now. Check back soon.
    } @else {
      No articles in "{{ category() }}" yet. Try another category.
    }
  </p>
</div>
